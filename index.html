<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Loops</title>

<style>.nav{
position:fixed;
top:0;
left:0;
width:100%;
background:black;
z-index:9998;
}

.menu-btn{
font-size:30px;
cursor:pointer;
color:white;
position:relative;
z-index:10000;
}
.menu-btn{
font-size:30px;
cursor:pointer;
color:white;
position:relative;
z-index:9999;
}
body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
color:#111;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
position:fixed;
top:0;
width:100%;
background:black;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.menu-btn{
font-size:26px;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
top:0;
right:-100%;
width:70%;
height:100%;
background:black;
color:white;
padding:40px;
transition:.4s;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:20px 0;
font-size:20px;
}

.menu.active{
right:0;
}

/* HERO */

.hero{
margin-top:60px;
height:90vh;
width:100%;
max-width:100%;
background:url("EA5CE40E-81E9-4405-919E-E2A0A9394AC4.jpeg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.hero-overlay{
background:rgba(0,0,0,.65);
padding:40px;
border-radius:15px;
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
opacity:.8;
}

.btn{
background:white;
color:black;
padding:14px 28px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:20px;
font-weight:bold;
}

/* COLLECTION */

.section{
padding:60px 20px;
background:#f5f5f5;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:30px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.order-btn{
margin-top:15px;
display:inline-block;
background:black;
color:white;
padding:12px 25px;
border-radius:25px;
text-decoration:none;
}

/* CTA */

.cta{
background:black;
color:white;
padding:60px 20px;
text-align:center;
}

.cta a{
display:block;
margin:15px auto;
width:220px;
padding:14px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.whatsapp{
background:white;
color:black;
}

.instagram{
border:2px solid white;
color:white;
}

/* FOOTER */

.footer{
background:#111;
color:white;
padding:40px 20px;
text-align:center;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<<div class="nav" style="
position:fixed;
top:0;
width:100%;
z-index:1000;
">
<div>Urban Loops</div>
<div class="menu-btn" onclick="toggleMenu()" style="color:white;">
☰
</div>

<!-- SIDE MENU -->
<div class="menu" id="menu">
<a href="#">Products</a>
<a href="#">About</a>
<a href="https://instagram.com/zamzam_vintage_" target="_blank">Instagram</a>
</div>

<!-- HERO -->
<section class="hero">
<div class="hero-overlay">
<h1>URBAN LOOPS</h1>
<p>Premium Streetwear Denim For Global Resellers</p>
<a href="#collection" class="btn">Shop Collection ↓</a>
</div>
</section>

<!-- COLLECTION -->
<section class="section" id="collection">

<div class="card">
<img src="IMG_1793.jpeg">
<h2>Baggy Hip Hop Embroidery Jeans</h2>
<a class="order-btn"
href="https://wa.me/447561587249">
Order Now
</a>
</div>

<div class="card">
<img src="IMG_2480.png">
<h2>Baggy Hip Hop Embroidery Shorts</h2>
<a class="order-btn"
href="https://wa.me/447561587249">
Order Now
</a>
</div>

</section>

<!-- CTA -->
<section class="cta">
<h2>Ready To Order?</h2>

<a class="whatsapp"
href="https://wa.me/447561587249">
WhatsApp Us
</a>

<a class="instagram"
href="https://instagram.com/zamzam_vintage_">
Follow Us
</a>

</section>

<!-- FOOTER -->
<div class="footer">
© 2026 Urban Loops
</div>

<script>
function toggleMenu(){
document.getElementById("menu")
.classList.toggle("active");
}
</script>

</body>
</html>
